# ============================================
# ERP Nexus - Nginx Configuration
# Salvar em: /etc/nginx/sites-available/erpnexus
# Ativar: sudo ln -s /etc/nginx/sites-available/erpnexus /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
# ============================================

upstream gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    client_max_body_size 100M;

    # Logs
    access_log /opt/erpnexus/logs/nginx_access.log;
    error_log /opt/erpnexus/logs/nginx_error.log;

    # Static files - servir direto sem passar por Django
    location /static/ {
        alias /opt/erpnexus/erp_backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files - uploads
    location /media/ {
        alias /opt/erpnexus/erp_backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Service Worker - sempre fresh
    location /sw.js {
        alias /opt/erpnexus/erp_backend/staticfiles/sw.js;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Manifest - sempre fresh
    location /manifest.json {
        alias /opt/erpnexus/erp_backend/staticfiles/manifest.json;
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Cloudflare Tunnel - reconhecer como HTTPS
    location / {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;

        # WebSocket support (para notificações real-time, se implementado)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
